name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      with_integration:
        description: "Run integration tests against docker-compose services"
        type: boolean
        default: false

# Cancel in-progress runs for the same ref so we don't burn CI minutes
# on a stale branch after the user pushes a fix.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  GOPROXY: https://proxy.golang.org,direct

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests + vet + build. Runs on every push and PR. Coverage is
  # collected and uploaded as an artifact (codecov-style coverage reports
  # would slot in here as a follow-up step).
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Show Go env
        run: |
          go version
          go env GOOS GOARCH GOFLAGS GOMODCACHE

      - name: Download modules
        run: go mod download

      # go vet runs structural checks; cheap and catches most bugs that
      # go build does not (printf format mistakes, unreachable code,
      # misuse of sync, etc.).
      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # The mqx replace directive points at ../mqx, so a sibling
      # checkout is required. The bootstrap step installs it from the
      # same commit as vectorx if the local path is missing.
      - name: Bootstrap mqx sibling module
        run: |
          set -euo pipefail
          if [ ! -d ../mqx ]; then
            echo "::warning::sibling mqx module missing at ../mqx — attempting clone"
            cd ..
            git clone --depth 1 https://github.com/gospacex/mqx.git mqx
            cd -
          fi

      # Top-level package guards (see vectorx_deps_test.go): the
      # adapter packages must not import the top-level vectorx package,
      # and the top-level package must not pull in redis/kafka SDKs.
      # Running them under the unit gate keeps the architecture
      # boundaries from regressing.
      - name: Architecture boundary checks
        run: |
          go test -race -count=1 -run 'TestTopLevel_' ./...

      # Race detector is non-negotiable for a package that runs a
      # sync.Map + per-key mutex hot path. -count=1 disables the test
      # cache so a flaky test cannot pass on cached output.
      - name: Run unit tests (race)
        run: go test -race -count=1 -timeout 5m ./...

      - name: Coverage report
        run: |
          set -euo pipefail
          go test -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1
          mkdir -p coverage
          cp coverage.out coverage/coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/coverage.out
          retention-days: 14
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Integration tests: bring up Milvus / Qdrant / Weaviate via the
  # docker-compose file at example/docker-compose.yml, wait for them to
  # be ready, then run the `//go:build integration` test packages.
  #
  # Triggered on:
  #   - push to main
  #   - manual workflow_dispatch when with_integration=true
  #   - PR labelled `integration` (use the gh CLI to apply)
  #
  # Skipped on regular PRs to keep the queue fast; manual dispatch is
  # the documented "I want to verify against real services" path.
  # ---------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 30
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.with_integration)

    services:
      # docker-compose provides all three vector DBs plus their
      # dependencies (etcd/minio for milvus). We replicate the same
      # services here as native service containers so each one gets a
      # first-class health-check and a stable DNS name.
      milvus:
        image: milvusdb/milvus:v2.4.17
        ports:
          - 19530:19530
        env:
          ETCD_ENDPOINTS: etcd:2379
          MINIO_ADDRESS: minio:9000
        options: >-
          --health-cmd "curl -f http://localhost:9091/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      etcd:
        image: quay.io/coreos/etcd:v3.5.18
        env:
          ETCD_AUTO_COMPACTION_MODE: revision
          ETCD_AUTO_COMPACTION_RETENTION: "1000"
          ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
          ETCD_ADVERTISE_CLIENT_URLS: http://127.0.0.1:2379
        ports:
          - 2379:2379
      minio:
        image: minio/minio:RELEASE.2024-12-18T13-15-44Z
        env:
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        ports:
          - 9000:9000
      qdrant:
        image: qdrant/qdrant:v1.13.4
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "wget -q --spider http://localhost:6333/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      weaviate:
        image: cr.weaviate.io/semitechnologies/weaviate:1.30.2
        env:
          PERSISTENCE_DATA_PATH: /var/lib/weaviate
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          DEFAULT_VECTORIZER_MODULE: "none"
        ports:
          - 8080:8080
        options: >-
          --health-cmd "wget -q --spider http://localhost:8080/v1/.well-known/ready || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 18

    env:
      INTEGRATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Bootstrap mqx sibling module
        run: |
          set -euo pipefail
          if [ ! -d ../mqx ]; then
            echo "::warning::sibling mqx module missing at ../mqx — attempting clone"
            cd ..
            git clone --depth 1 https://github.com/gospacex/mqx.git mqx
            cd -
          fi

      # Service container health-checks gate container readiness, but
      # milvus itself has a longer warm-up (it has to register with
      # etcd before it serves gRPC). Poll the SDK port until it answers
      # or the timeout fires.
      - name: Wait for services
        run: |
          set -euo pipefail
          wait_for() {
            local url=$1 name=$2 timeout=${3:-120}
            echo "Waiting for $name at $url (timeout ${timeout}s)"
            for i in $(seq 1 "$timeout"); do
              if curl -sf -o /dev/null "$url"; then
                echo "$name is up"
                return 0
              fi
              sleep 1
            done
            echo "::error::$name did not become ready within ${timeout}s"
            return 1
          }
          # Milvus exposes a /health endpoint behind milvusdb/milvus.
          wait_for http://localhost:9091/health milvus 180
          wait_for http://localhost:6333/healthz qdrant 60
          wait_for http://localhost:8080/v1/.well-known/ready weaviate 180

      - name: Build integration tests
        run: go vet -tags=integration ./...

      # Each example/*_test directory is a self-contained integration
      # scenario. Run them sequentially — they share docker-compose
      # ports and concurrent SDK connections would just confuse the
      # "is the wiring correct" signal.
      - name: Milvus integration tests
        run: go test -race -count=1 -tags=integration -timeout 5m ./example/milvusx_test/...

      - name: Qdrant integration tests
        run: go test -race -count=1 -tags=integration -timeout 5m ./example/qdrantx_test/...

      - name: Weaviate integration tests
        run: go test -race -count=1 -tags=integration -timeout 5m ./example/weaviatex_test/...

      - name: Runtime integration tests
        run: go test -race -count=1 -tags=integration -timeout 5m ./example/vectorx_runtime_test/...

      - name: Collect service logs
        if: failure()
        run: |
          echo "::group::Milvus container logs"
          docker logs "$(docker ps -aqf 'ancestor=milvusdb/milvus:v2.4.17')" || true
          echo "::endgroup::"
          echo "::group::Qdrant container logs"
          docker logs "$(docker ps -aqf 'ancestor=qdrant/qdrant:v1.13.4')" || true
          echo "::endgroup::"
          echo "::group::Weaviate container logs"
          docker logs "$(docker ps -aqf 'ancestor=cr.weaviate.io/semitechnologies/weaviate:1.30.2')" || true
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Lint: golangci-lint with a minimal rule set. Kept as a separate
  # job so a failure here doesn't block the unit-test signal — and
  # vice-versa, since lint cache hits are usually faster than the
  # full test run.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Bootstrap mqx sibling module
        run: |
          set -euo pipefail
          if [ ! -d ../mqx ]; then
            cd ..
            git clone --depth 1 https://github.com/gospacex/mqx.git mqx
            cd -
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout 5m